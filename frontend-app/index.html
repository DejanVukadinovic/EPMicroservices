<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EPOS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="/css/styles.css" />

    <script type="module" src="/js/login.js"></script>
</head>

<body>
    <main v-scope class="app-shell">
        <nav class="navbar border-bottom app-navbar">
            <div class="container">
                <a class="navbar-brand fw-semibold" href="#">EPOS</a>

                <button class="btn btn-outline-primary btn-sm" @click="toggleTheme">
                    {{ theme === 'dark' ? 'Light' : 'Dark' }}
                </button>
            </div>
        </nav>

        <section class="container app-main">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-7 col-lg-5">
                    <div class="card app-card">
                        <div class="card-body">
                            <h1 class="h3 mb-2">
                                {{ mode === 'login' ? 'Welcome back' : 'Request access' }}
                            </h1>

                            <p class="text-body-secondary mb-4">
                                {{ mode === 'login'
                                ? 'Sign in to manage EPOS services.'
                                : 'Register your company for EPOS access.' }}
                            </p>

                            <div class="btn-group w-100 mb-4">
                                <button class="btn" :class="mode === 'login' ? 'btn-primary' : 'btn-outline-primary'"
                                    @click="mode = 'login'">
                                    Login
                                </button>
                                <button class="btn" :class="mode === 'register' ? 'btn-primary' : 'btn-outline-primary'"
                                    @click="mode = 'register'">
                                    Register
                                </button>
                            </div>

                            <form v-if="mode === 'login'" @submit.prevent="login">
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input v-model="loginForm.email" type="email" class="form-control" required />
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <input v-model="loginForm.password" type="password" class="form-control" required />
                                </div>

                                <button class="btn btn-primary w-100" :disabled="loading">
                                    {{ loading ? 'Signing in...' : 'Sign in' }}
                                </button>
                            </form>

                            <form v-else @submit.prevent="registerTenant">
                                <div class="mb-3">
                                    <label class="form-label">Company name</label>
                                    <input v-model="registerForm.companyName" class="form-control" required />
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input v-model="registerForm.email" type="email" class="form-control" required />
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <input v-model="registerForm.password" type="password" class="form-control" required />
                                </div>

                                <button class="btn btn-primary w-100" :disabled="loading">
                                    {{ loading ? 'Submitting...' : 'Submit request' }}
                                </button>
                            </form>

                            <div v-if="error" class="alert alert-danger py-2 mt-3">
                                {{ error }}
                            </div>

                            <div v-if="success" class="alert alert-success py-2 mt-3">
                                {{ success }}
                            </div>
                        </div>
                    </div>
                </div>
            </div>


        </section>
    </main>
</body>

</html>
